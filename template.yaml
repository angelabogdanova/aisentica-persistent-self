AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Aisentica Persistent Self — conflict-aware persistent identity memory on CockroachDB and AWS.

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
  AllowedOrigin:
    Type: String
    Default: '*'
  ModelMode:
    Type: String
    Default: bedrock
    AllowedValues: [bedrock, hybrid, deterministic]
  ReasoningModelId:
    Type: String
    Default: global.amazon.nova-2-lite-v1:0
  EmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 35
    Tracing: Active
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        ALLOWED_ORIGIN: !Ref AllowedOrigin
        MODEL_MODE: !Ref ModelMode
        BEDROCK_REASONING_MODEL_ID: !Ref ReasoningModelId
        BEDROCK_EMBEDDING_MODEL_ID: !Ref EmbeddingModelId
        EMBEDDING_DIMENSIONS: '512'
        EXPORT_BUCKET: !Ref ExportBucket

Resources:
  PersistentSelfApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: '$default'
      DefaultRouteSettings:
        ThrottlingBurstLimit: 10
        ThrottlingRateLimit: 5
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [content-type]
        MaxAge: 86400

  MemoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend
      Handler: src/handler.handler
      ReservedConcurrentExecutions: 5
      Policies:
        - AWSXRayDaemonWriteAccess
        - S3WritePolicy:
            BucketName: !Ref ExportBucket
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref PersistentSelfApi
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handler.ts
        Minify: true
        Target: es2022
        Format: esm
        OutExtension:
          - .js=.mjs
        Sourcemap: true

  ExportBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireDemoExports
            Status: Enabled
            ExpirationInDays: 30

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  WebsiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  WebsiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Origins:
          - Id: website-s3
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt WebsiteOriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: website-s3
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${WebsiteDistribution}'

Outputs:
  ApiUrl:
    Value: !Sub 'https://${PersistentSelfApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}'
  WebsiteUrl:
    Value: !Sub 'https://${WebsiteDistribution.DomainName}'
  WebsiteBucketName:
    Value: !Ref WebsiteBucket
  DistributionId:
    Value: !Ref WebsiteDistribution
  ExportBucketName:
    Value: !Ref ExportBucket

name: Apply CockroachDB migrations

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Apply database migrations
        env:
          DATABASE_URL: ${{ secrets.COCKROACH_MIGRATION_DATABASE_URL }}
        run: npm run migrate
